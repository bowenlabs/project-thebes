packages:
  - 'packages/*'
  - 'app/workers/*'
  - 'examples/*'

allowBuilds:
  better-sqlite3: false
  core-js-pure: true
  esbuild: true
  sharp: true
  workerd: true

minimumReleaseAgeExclude:
  - '@astrojs/cloudflare@14.0.1'
  - '@astrojs/starlight@0.41.1'
  - '@expressive-code/core@0.44.0'
  - '@expressive-code/plugin-frames@0.44.0'
  - '@expressive-code/plugin-shiki@0.44.0'
  - '@expressive-code/plugin-text-markers@0.44.0'
  - astro-expressive-code@0.44.0
  - astro@7.0.3
  - expressive-code@0.44.0
  - rehype-expressive-code@0.44.0

overrides:
  # Pinned below latest to clear pnpm's minimum-release-age supply-chain
  # policy (packages published <24h ago get blocked). Bump once the
  # corresponding "latest" version has aged past the cutoff.
  miniflare: '4.20260617.1'
  '@cloudflare/vite-plugin': '1.42.1'
  nanoid: '3.3.14'
